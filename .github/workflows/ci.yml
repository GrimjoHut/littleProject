name: Java CI/CD with Maven

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        run: mvn -B clean package

      - name: Prepare app jar
        run: cp target/demo-github-actions-1.0.0-SNAPSHOT.jar app.jar

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: app.jar

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: .

      - name: Copy jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          source: "app.jar"
          target: "/opt/demo-github-actions/"

      - name: Restart app on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          script: |
            sudo systemctl restart demo-github-actions
            sudo systemctl status demo-github-actions --no-pager